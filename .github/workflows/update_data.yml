name: Update Forex Data

on:
  schedule:
    - cron: '0 6 * * 1-5'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Download & update forex data
        run: python data_updater.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "chore: auto-update forex data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
